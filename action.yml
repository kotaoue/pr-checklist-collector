name: 'PR Checklist Collector'
description: 'When a pull request is merged, collects the checklist state from the PR body and saves it as a file committed to the base branch.'
author: 'kotaoue'

branding:
  icon: 'check-square'
  color: 'green'

inputs:
  output_file:
    description: 'Repository-relative path for the output file. Use {yyyy-mm-dd} (or other date tokens) to embed the current date (e.g. "results/{yyyy-mm-dd}.json" → "results/2026-03-08.json").'
    required: true
  github_token:
    description: 'GitHub token used to commit the result file.'
    required: false
    default: ${{ github.token }}

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    INPUT_OUTPUT_FILE: ${{ inputs.output_file }}
    GITHUB_TOKEN: ${{ inputs.github_token }}
